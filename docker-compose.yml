services:
  mongo:
    image: mongo:7
    container_name: homeos-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: homeos

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: homeos-api
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/homeos

volumes:
  mongo-data:
